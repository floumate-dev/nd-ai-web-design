<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>naučidizajn™</title>
<style>
  :root{
    --nd-bela:#FFFFFF;
    --nd-body-on-dark:#D3D3D3;
    --nd-border-on-dark:rgba(255,255,255,0.14);
    --nd-dur:180ms;
    --nd-ease:cubic-bezier(0.22,1,0.36,1);
    --nd-fluo:#DBFF00;
    --nd-font-sans:"Raptor Text",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --nd-font-serif:"Saol Standard",Georgia,"Times New Roman",serif;
    --nd-maslina-100:#797D73;
    --nd-maslina-300:#313330;
    --nd-maslina-400:#232421;
    --nd-on-accent:#232421;
    --nd-radius-md:8px;
    --nd-radius-pill:999px;
    --nd-radius-xl:24px;
    --nd-surface-dark:#232421;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--nd-surface-dark);
    color:var(--nd-bela);
    font-family:var(--nd-font-sans);
    line-height:1.4;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  header{border-bottom:1px solid var(--nd-border-on-dark)}
  .nd-header-inner{
    max-width:1120px;margin:0 auto;padding:0 24px;height:64px;
    display:flex;align-items:center;justify-content:center;
  }
  .nd-logo{display:inline-flex;align-items:center;gap:9px;color:var(--nd-bela)}
  .nd-logo svg{display:block;flex-shrink:0}
  .nd-logo span{
    font-family:var(--nd-font-sans);font-weight:600;font-size:20.3px;
    letter-spacing:-0.02em;white-space:nowrap;
  }

  main{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:clamp(48px,9vw,80px) 24px;
  }
  .nd-hero{max-width:640px;text-align:center}
  .nd-eyebrow{
    font-weight:600;font-size:14px;letter-spacing:0.04em;text-transform:uppercase;
    color:var(--nd-fluo);
  }
  .nd-hero h1{
    margin:16px 0 0;font-family:var(--nd-font-sans);font-weight:500;
    font-size:clamp(32px,7vw,56px);line-height:1.08;letter-spacing:-0.03em;
    color:var(--nd-bela);
  }
  .nd-hero h1 em{font-family:var(--nd-font-serif);font-style:italic;color:var(--nd-fluo)}
  .nd-hero p{
    margin:20px auto 0;max-width:480px;font-size:clamp(15px,4vw,18px);
    line-height:1.55;color:var(--nd-body-on-dark);
  }

  .nd-actions{
    margin-top:40px;display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
  }
  .nd-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
    padding:20px 40px;border-radius:var(--nd-radius-md);
    font-family:var(--nd-font-sans);font-weight:600;font-size:18px;line-height:24px;
    letter-spacing:-0.01em;border:1px solid transparent;cursor:pointer;
    text-decoration:none;white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
    transition:background var(--nd-dur) var(--nd-ease),color var(--nd-dur) var(--nd-ease),
      transform var(--nd-dur) var(--nd-ease),border-color var(--nd-dur) var(--nd-ease);
  }
  .nd-btn-primary{background:var(--nd-fluo);color:var(--nd-on-accent)}
  .nd-btn-primary:hover{transform:translateY(-2px)}
  .nd-btn-secondary{background:transparent;color:var(--nd-bela);border-color:var(--nd-border-on-dark)}
  .nd-btn-secondary:hover{background:var(--nd-maslina-300);border-color:var(--nd-fluo);transform:translateY(-2px)}

  footer{
    padding:24px;text-align:center;font-size:14px;color:var(--nd-maslina-100);
    border-top:1px solid var(--nd-border-on-dark);
  }
</style>
</head>
<body>
  <header>
    <div class="nd-header-inner">
      <span class="nd-logo">
        <svg viewBox="460 275 205 235" width="29" height="29" fill="currentColor" aria-hidden="true">
          <polyline points="546.46 322.08 546.4 322.11 533.98 329.28 505.62 345.65 477.42 329.37 505.77 313 505.78 313 521.36 304 534.04 296.67 534.05 296.67 559.05 282.23 559.06 282.23 562.05 280.5 565.05 282.23 590.26 296.79 588.45 297.83"></polyline>
          <polygon points="658.44 336.15 658.44 368.5 656.63 367.45 646.94 361.86 618.74 345.57 615.08 347.68 615.07 347.69 590.46 361.89 562.11 378.26 562.1 378.26 533.83 394.59 505.55 410.91 477.35 394.63 465.67 387.89 465.67 355.24 469.64 357.53 477.34 361.98 477.35 361.98 505.62 378.31 505.63 378.31 528.08 365.34 528.13 365.31 533.9 361.98 562.26 345.61 590.53 329.29 618.54 313.12 618.55 313.12 646.75 329.4 658.44 336.15"></polygon>
          <polygon points="658.44 401.14 658.44 433.88 642.36 424.59 618.55 410.85 590.27 427.17 561.99 443.5 533.72 459.82 510.41 473.28 482.18 456.98 465.67 447.45 465.67 420.53 467.3 421.47 477.28 427.23 505.49 443.52 533.76 427.2 562.03 410.88 562.04 410.88 590.31 394.55 607.67 384.53 607.7 384.51 618.67 378.18 646.9 394.48 658.44 401.14"></polygon>
          <polyline points="614.08 440.92 641.92 456.99 613.64 473.32 585.36 489.64 565.03 501.38 562.06 503.1 559.07 501.38 534.22 487.03 536.6 485.66 557.53 473.57 575.52 463.18 575.59 463.14"></polyline>
        </svg>
        <span>naučidizajn™</span>
      </span>
    </div>
  </header>

  <main>
    <div class="nd-hero">
      <div class="nd-eyebrow">AI Web Design</div>
      <h1>Nauči da praviš sajtove sa AI i nađi <em>prvog klijenta</em></h1>
      <p>Izaberi gde želiš da nastaviš.</p>
      <div class="nd-actions">
        <a class="nd-btn nd-btn-primary" href="/pitch">Pogledaj ponudu</a>
        <a class="nd-btn nd-btn-secondary" href="/replay">Gledaj snimak</a>
      </div>
    </div>
  </main>

  <footer>© naučidizajn™</footer>
</body>
</html>
